apiVersion: v1
kind: ConfigMap
metadata:
  name: {{.Values.redis.name}}-config
  labels:
    app: {{.Values.redis.name}}
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    requirepass REDIS_PASSWORD_PLACEHOLDER
    timeout {{ .Values.redis.config.timeout }}
    tcp-keepalive {{ .Values.redis.config.tcp_keepalive }}
    maxmemory {{ .Values.redis.config.maxmemory }}
    maxmemory-policy {{ .Values.redis.config.maxmemory_policy }}
    save 900 1
    save 300 10
    save 60 10000
    rdbcompression yes
    rdbchecksum yes
    dbfilename dump.rdb
    dir /data
  init-redis.sh: |
    #!/bin/bash
    if [ -f /etc/redis-secret/redis-password ]; then
      REDIS_PASSWORD=$(cat /etc/redis-secret/redis-password)
      sed "s/REDIS_PASSWORD_PLACEHOLDER/$REDIS_PASSWORD/g" /etc/redis/redis.conf > /tmp/redis.conf
      exec redis-server /tmp/redis.conf
    else
      exec redis-server /etc/redis/redis.conf
    fi