apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.redis.name }}
  labels:
    app: {{ .Values.redis.name }}
spec:
  serviceName: {{ .Values.redis.service.name }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.redis.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.redis.name }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - containerPort: {{.Values.service.port}}
              name: redis
          command:
            - /bin/sh
            - /etc/redis/init-redis.sh
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
            - name: redis-secret
              mountPath: /etc/redis-secret
              readOnly: true
            {{- if .Values.redis.persistence.enabled }}
            - name: redis-data
              mountPath: /data
            {{- end }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -a $(cat /etc/redis-secret/redis-password) ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -a $(cat /etc/redis-secret/redis-password) ping
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-creds
                  key: REDIS_PASSWORD
        {{- if .Values.redis.metrics.enabled }}
        - name: redis-exporter
          image: "{{ .Values.redis.metrics.image.repository }}:{{ .Values.redis.metrics.image.tag }}"
          ports:
            - containerPort: {{ .Values.redis.metrics.port }}
              name: metrics
          env:
            - name: REDIS_ADDR
              value: "localhost:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-creds
                  key: REDIS_PASSWORD
        {{- end }}
      volumes:
        - name: redis-config
          configMap:
            name: {{.Values.redis.name}}-config
        - name: redis-secret
          secret:
            secretName: redis-creds
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size | default "8Gi" }}
        storageClassName: {{ .Values.redis.persistence.storageClass }}
  {{- end }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate