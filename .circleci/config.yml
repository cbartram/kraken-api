version: 2.1

jobs:
  build-and-deploy:
    docker:
      - image: cimg/go:1.24.4
    steps:
      - setup_remote_docker:
          docker_layer_caching: true
      - checkout
      - restore_cache:
          key: go-mod-{{ checksum "go.sum" }}
      - run:
          name: Download Go Modules
          command: |
            go env -w GOPRIVATE=github.com/cbartram
            git config --global url."https://$GITHUB_USER:$GITHUB_TOKEN@github.com/cbartram/".insteadOf "https://github.com/cbartram/"
            go mod download
      - run:
          name: Build Go Binary
          command: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o main main.go
      - run:
          name: Run Tests
          command: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go test -v ./...
      - run:
          name: Build and Push Docker Image
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ] || [ "$CIRCLE_BRANCH" = "master" ]; then
              TAG="latest"
            else
              TAG=0.1.$CIRCLE_BUILD_NUM
            fi

            IMAGE_NAME="$DOCKER_USER/kraken-api:$TAG"            
            docker build . -f Dockerfile -t "$IMAGE_NAME"
            echo $DOCKER_TOKEN | docker login -u $DOCKER_USER --password-stdin
            docker push "$IMAGE_NAME"

            echo "$IMAGE_NAME" > /tmp/docker_image_name
      - persist_to_workspace:
          root: /tmp
          paths:
            - docker_image_name
      - save_cache:
          key: go-mod-{{ checksum "go.sum" }}
          paths:
            - /home/circleci/go/pkg/mod
  deploy-prod:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - attach_workspace:
          at: /tmp
      - run:
          name: Install Helm
          command: |
            curl https://get.helm.sh/helm-v3.12.3-linux-amd64.tar.gz | tar xz
            sudo mv linux-amd64/helm /usr/local/bin/helm
            helm version
      - run:
          name: Install kubectl
          command: |
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
            kubectl version --client
      - run:
          name: Deploy to Kubernetes with Helm
          command: |
            IMAGE_NAME=$(cat /tmp/docker_image_name)
            echo "Deploying image: $IMAGE_NAME"

            helm upgrade kraken-api ./manifests/kraken-api \
              -f ./manifests/kraken-api/values.yaml \
              --set image.repository=cbartram/kraken-api \
              --set image.tag=$(echo $IMAGE_NAME | cut -d':' -f2) \
              --install \
              --wait \
              --timeout=300s

workflows:
  build-and-deploy:
    jobs:
      - build-and-deploy:
          context:
            - Kraken Env
      - deploy-prod:
          context:
            - Kraken Env
          filters:
            branches:
              only:
                - main
                - master
