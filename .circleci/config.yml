version: 2.1

jobs:
  build-and-deploy:
    docker:
      - image: cimg/go:1.24.4
    steps:
      - setup_remote_docker:
          docker_layer_caching: true
      - checkout
      - restore_cache:
          key: go-mod-{{ checksum "go.sum" }}
      - run:
          name: Download Go Modules
          command: |
            go env -w GOPRIVATE=github.com/cbartram
            git config --global url."https://$GITHUB_USER:$GITHUB_TOKEN@github.com/cbartram/".insteadOf "https://github.com/cbartram/"
            go mod download
      - run:
          name: Build Go Binary
          command: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o main main.go
      - run:
          name: Run Tests
          command: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go test -v ./...
      - run:
          name: Build and Push Docker Image
          command: |
            VERSION_TAG="0.1.$CIRCLE_BUILD_NUM"
            IMAGE_NAME_VERSION="$DOCKER_USER/kraken-api:$VERSION_TAG"

            docker build . -f Dockerfile -t "$IMAGE_NAME_VERSION"
            echo $DOCKER_TOKEN | docker login -u $DOCKER_USER --password-stdin
            docker push "$IMAGE_NAME_VERSION"

            # If main or master branch, also tag and push as latest
            if [ "$CIRCLE_BRANCH" = "main" ] || [ "$CIRCLE_BRANCH" = "master" ]; then
              IMAGE_NAME_LATEST="$DOCKER_USER/kraken-api:latest"
              docker tag "$IMAGE_NAME_VERSION" "$IMAGE_NAME_LATEST"
              docker push "$IMAGE_NAME_LATEST"
            
              echo "Pushing :latest tag"
            else
              echo "Pushing :$VERSION_TAG tag only, not latest"
            fi
      - persist_to_workspace:
          root: /tmp
          paths:
            - docker_image_name
      - save_cache:
          key: go-mod-{{ checksum "go.sum" }}
          paths:
            - /home/circleci/go/pkg/mod
  deploy-prod:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - attach_workspace:
          at: /tmp
      - run:
          name: Install ArgoCD CLI
          command: |
            URL=https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
            [ -w /usr/local/bin ] && SUDO="" || SUDO=sudo
            $SUDO curl --insecure -sSL -o /usr/local/bin/argocd $URL
            $SUDO chmod +x /usr/local/bin/argocd
            
            argocd login https://argocd-kraken.duckdns.org --insecure --username $ARGOCD_USERNAME --password $ARGOCD_PASSWORD
      - run:
          name: Manual sync
          command: |
            VERSION_TAG="0.1.$CIRCLE_BUILD_NUM"
            argocd app sync kraken-api --helm-set image.tag=$VERSION_TAG
      - run:
          name: Wait for sync
          command: argocd app wait kraken-api

workflows:
  build-and-deploy:
    jobs:
      - build-and-deploy:
          context:
            - Kraken Env
      - deploy-prod:
          context:
            - Kraken Env
          filters:
            branches:
              only:
                - main
                - master
